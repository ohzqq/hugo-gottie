<gottie-anim id="{{.Title}}" 
             src="{{path.Join "/" .RelPermalink  .Src}}"
{{- with .Autoplay}} autoplay {{end -}}
{{- with .Loop}}loop {{end -}}
{{- with .BackgroundColor}}background-color="{{.}}" {{end -}}
{{- with .AnimationID}}animation-id="{{.}}" {{end -}}
{{- with .Speed}}speed="{{.}}" {{end -}}
{{- with .Frame}}frame="{{.}}" {{end -}}
             {{- with .Mode}}mode="{{.}}" {{end -}}>
</gottie-anim>

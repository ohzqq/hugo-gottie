baseURL: 'https://example.org/'
languageCode: 'en-us'
title: 'My New Hugo Project'

theme:
  - picocss
  
params:
  picocss:
    layout: container-fluid
    breadcrumbs: true
    color: amber
  gottie:
    AutoResize: true
    AspectRatio: 16/9
    Controls: true
    Fit: contain
    Align: 0.5 0.5
    Autoplay: true
    Loop: true
    Mode: bounce
    Speed: 0.5
    BackgroundColor: "#444444"
